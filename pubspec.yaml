name: movie_sansaar_mobile
description: "A new Flutter project."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  flutter_dotenv: ^5.1.0
  provider: ^6.1.5
  dio: ^5.4.0
  shared_preferences: ^2.5.3

  # Video
  flutter_inappwebview: ^6.1.5
  webview_flutter: ^4.10.0

  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Voice
  speech_to_text: ^7.1.0
  permission_handler: ^12.0.0+1

  # Firebase
  firebase_core: ^3.15.1
  firebase_auth: ^5.6.2
  cloud_firestore: ^5.6.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo/ms_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo/ms_logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF" # or "#000000" for dark splash
  image: assets/logo/ms_logo.png
  branding: assets/logo/ms_logo.png
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/logo/
    - .env
